name: Bug report
description: Report a problem with Passflares
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

        ⚠️ **Do not report security vulnerabilities here.** Public issues are
        visible to everyone. Report them privately via
        [GitHub Security Advisories](https://github.com/PierreFouquet/Passflares/security/advisories/new)
        instead.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug — what went wrong.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen instead?
    validations:
      required: false

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      description: Where did you hit this?
      options:
        - passflares.com (hosted)
        - Self-hosted (your own Cloudflare Worker)
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Browser & OS
      description: Which browser and operating system?
      placeholder: e.g. Firefox 126 on Windows 11
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Version
      description: The version shown in the app's account menu footer.
      placeholder: e.g. v1.1.2
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console errors / logs
      description: Any relevant browser console output. This is automatically formatted, so no backticks needed.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: This is not a security vulnerability (those go to [Security Advisories](https://github.com/PierreFouquet/Passflares/security/advisories/new)).
          required: true
        - label: I searched [existing issues](https://github.com/PierreFouquet/Passflares/issues) and this has not already been reported.
          required: true
