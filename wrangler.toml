# ============================================================
#  Heads up — forking this project?
#  The IDs in this file (D1 database_id, KV namespace id, R2
#  bucket_name, the passflares.com route) belong to the
#  upstream maintainer's Cloudflare account. They are not
#  secrets, but they will NOT work for you — `wrangler deploy`
#  will fail with permission errors until you swap them out.
#
#  See `wrangler.toml.example` for a clean template with
#  step-by-step instructions for setting up your own
#  Cloudflare resources.
# ============================================================

name = "passflares"
main = "src/worker.ts"
compatibility_date = "2026-05-26"
compatibility_flags = [ "nodejs_compat" ]
tsconfig = "tsconfig.json"

routes = [
    # `pattern` is the exact host(+path) the Worker handles; `zone_name` is the
    # Cloudflare zone that owns the DNS. Here both are the apex `passflares.com`.
    # A proxied (orange-cloud) DNS record must exist for `passflares.com`, or the
    # route receives no traffic. `www.passflares.com` is handled separately by a
    # Cloudflare Single Redirect Rule (www -> apex), not by this Worker.
    { pattern = "passflares.com/*", zone_name = "passflares.com" }
]
preview_urls = false

[assets]
directory = "./public"
binding = "ASSETS"
# Run the Worker for every request — including static assets — so the
# security-header layer in src/worker.ts (CSP, HSTS, etc.) is actually
# applied to HTML/JS/CSS responses. Without this, Cloudflare serves assets
# directly from its CDN and skips the Worker entirely.
run_worker_first = true

# ========================
# PRODUCTION ENVIRONMENT
# JWT_SECRET, TURNSTILE_KEY, and TOTP_ENC_KEY are stored as Cloudflare secrets.
# To update: wrangler secret put JWT_SECRET
# TOTP_ENC_KEY encrypts users' TOTP secrets at rest — set a long random value
# (>= 32 chars); rotating it invalidates existing 2FA enrollments.
# ========================

[[r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "912ffecc0a27412ba662c890c9f9d4e2"

[[d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "b7de341a-1977-44c3-9641-9f455e87a207"

# ========================
# OBSERVABILITY
# ========================
[observability.logs]
enabled = true
