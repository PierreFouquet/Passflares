name = "passflares"
main = "src/worker.ts"
compatibility_date = "2026-05-19"
compatibility_flags = [ "nodejs_compat" ]
tsconfig = "tsconfig.json"

routes = [
    { pattern = "*pierrefouquet.co.uk/*", zone_name = "pierrefouquet.co.uk" }
]

[assets]
directory = "./public"
binding = "ASSETS"

# ========================
# PRODUCTION ENVIRONMENT
# ========================
[vars]
JWT_SECRET = "{{ JWT_SECRET }}"
TURNSTILE_KEY = "{{ TURNSTILE_KEY }}"

[[r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "RATE_LIMIT_PROD_ID"

[[d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "PROD_D1_DATABASE_ID"

# ========================
# PRERELEASE ENVIRONMENT
# ========================
[env.prerelease]
name = "passflares"
workers_dev = true
vars = { ENVIRONMENT = "prerelease", JWT_SECRET = "{{ JWT_SECRET }}", TURNSTILE_KEY = "{{ TURNSTILE_KEY }}" }
routes = [{ pattern = "*passflares-prerelease.pierrefouquet93.workers.dev/*", zone_name = "pierrefouquet93.workers.dev" }]

[[env.prerelease.r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2"

[[env.prerelease.kv_namespaces]]
binding = "RATE_LIMIT"
id = "RATE_LIMIT_PREVIEW_ID"

[[env.prerelease.d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "PREVIEW_D1_DATABASE_ID"

# ========================
# LOCAL DEVELOPMENT
# ========================
[env.local]
name = "passflares-local"
vars = { ENVIRONMENT = "local", JWT_SECRET = "local-dev-secret-change-me", TURNSTILE_KEY = "1x0000000000000000000000000000000AA" }

[[env.local.r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2-local"

[[env.local.kv_namespaces]]
binding = "RATE_LIMIT"
id = "kv"

[[env.local.d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "db"

# ========================
# OBSERVABILITY
# ========================
[observability.logs]
enabled = true
