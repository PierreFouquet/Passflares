name = "passflares"
main = "src/worker.ts"
compatibility_date = "2025-07-19"
compatibility_flags = [ "nodejs_compat" ]
tsconfig = "tsconfig.json"

[assets]
directory = "./public"
binding = "ASSETS"

# ========================
# PRODUCTION ENVIRONMENT
# ========================
[vars]
JWT_SECRET = "{{ JWT_SECRET }}"
TURNSTILE_KEY = "{{ TURNSTILE_KEY }}"

routes = [
    { pattern = "*pierrefouquet.co.uk/*", zone_name = "pierrefouquet.co.uk" }
]

[[r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "RATE_LIMIT_KV"

[[d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "PASSWORD_DB"

# ========================
# PRERELEASE ENVIRONMENT
# ========================
[env.prerelease]
name = "passflares"
workers_dev = true
vars = { ENVIRONMENT = "prerelease", JWT_SECRET = "{{ JWT_SECRET }}", TURNSTILE_KEY = "{{ TURNSTILE_KEY }}", routes = "*passflares-prerelease.pierrefouquet93.workers.dev/*" }

[[env.prerelease.r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2"

[[env.prerelease.kv_namespaces]]
binding = "RATE_LIMIT"
id = "RATE_LIMIT_KV"

[[env.prerelease.d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "PASSWORD_DB"

# ========================
# LOCAL DEVELOPMENT
# ========================
[env.local]
name = "passflares-local"
vars = { ENVIRONMENT = "local", JWT_SECRET = "{{ JWT_SECRET }}", TURNSTILE_KEY = "{{ TURNSTILE_KEY }}", routes = "*localhost*"}

[[env.local.r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2-local"

[[env.local.kv_namespaces]]
binding = "RATE_LIMIT"
id = "kv"

[[env.local.d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "db"

# ========================
# OBSERVABILITY
# ========================
[observability.logs]
enabled = true
