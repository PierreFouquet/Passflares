name = "passflares"
main = "src/worker.ts"
compatibility_date = "2025-07-19"
node_compat = true
tsconfig = "tsconfig.json"

[assets]
directory = "./public"
binding = "ASSETS"

# ========================
# SHARED SECRETS
# ========================
[vars]
JWT_SECRET = "{{ JWT_SECRET }}"  # Same for all environments

# ========================
# PRODUCTION ENVIRONMENT
# ========================
[env.production]
name = "passflares"

routes = [
    "pierrefouquet.co.uk/*",
    "passflares.pierrefouquet93.workers.dev/*",
    "api.pierrefouquet.co.uk/*"
]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "secure-password-db-prod"
database_id = "PROD_D1_DATABASE_ID"

[[r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2-prod"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "RATE_LIMIT_PROD_ID"

# ========================
# PRERELEASE ENVIRONMENT
# ========================
[env.prerelease]
name = "passflares-prerelease"

routes = [
    "prerelease.passflares.pierrefouquet93.workers.dev/*\"
]

[vars]
ENVIRONMENT = "prerelease"

[[d1_databases]]
binding = "DB"
database_name = "secure-password-db-preview"
database_id = "PREVIEW_D1_DATABASE_ID"

[[r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2-preview"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "RATE_LIMIT_PREVIEW_ID"

# ========================
# LOCAL DEVELOPMENT
# ========================
[env.local]
name = "passflares-local"

[vars]
ENVIRONMENT = "local"
JWT_SECRET = "your-local-secret"  # Can be hardcoded for local

[[d1_databases]]
binding = "DB"
database_name = "secure-password-db-local"
database_id = "local"

[[r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2-local"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "local"

# ========================
# OBSERVABILITY
# ========================
[observability.logs]
enabled = true