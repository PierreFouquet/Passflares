name = "passflares"
main = "src/worker.ts"
compatibility_date = "2026-05-19"
compatibility_flags = [ "nodejs_compat" ]
tsconfig = "tsconfig.json"

routes = [
    { pattern = "*pierrefouquet.co.uk/*", zone_name = "pierrefouquet.co.uk" }
]
preview_urls = false

[assets]
directory = "./public"
binding = "ASSETS"

# ========================
# PRODUCTION ENVIRONMENT
# Secrets (JWT_SECRET, TURNSTILE_KEY) are stored in Cloudflare and must
# be set via: wrangler secret put JWT_SECRET
# ========================

[[r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "912ffecc0a27412ba662c890c9f9d4e2"

[[d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "b7de341a-1977-44c3-9641-9f455e87a207"

# ========================
# OBSERVABILITY
# ========================
[observability.logs]
enabled = true
