name = "passflares"
main = "src/worker.ts"
compatibility_date = "2025-07-19"
compatibility_flags = [ "nodejs_compat" ]
tsconfig = "tsconfig.json"

[assets]
directory = "./public"
binding = "ASSETS"

# ========================
# PRODUCTION ENVIRONMENT
# ========================
[vars]
JWT_SECRET = "{{ JWT_SECRET }}"
TURNSTILE_KEY = "{{ TURNSTILE_KEY }}"

routes = [
    { pattern = "*passflares.pierrefouquet.co.uk/*", zone_name = "pierrefouquet.co.uk", custom_domain = true }
]

[[r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "912ffecc0a27412ba662c890c9f9d4e2"

[[d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "b7de341a-1977-44c3-9641-9f455e87a207"

# ========================
# PRERELEASE ENVIRONMENT
# ========================
[env.prerelease]
name = "passflares"
workers_dev = true

[vars]
ENVIRONMENT = "prerelease"
JWT_SECRET = "{{ JWT_SECRET }}"
TURNSTILE_KEY = "{{ TURNSTILE_KEY }}" }

routes = [
    { pattern = "*passflares-prerelease.passflares.pierrefouquet.co.uk/*", custom_domain = true }
]

[[env.prerelease.r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2"

[[env.prerelease.kv_namespaces]]
binding = "RATE_LIMIT"
id = "912ffecc0a27412ba662c890c9f9d4e2"

[[env.prerelease.d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "b7de341a-1977-44c3-9641-9f455e87a207"

# ========================
# LOCAL DEVELOPMENT
# ========================
[env.local]
name = "passflares-local"
vars = { ENVIRONMENT = "local", JWT_SECRET = "{{ JWT_SECRET }}", TURNSTILE_KEY = "{{ TURNSTILE_KEY }}", routes = "*localhost*"}

[[env.local.r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2-local"

[[env.local.kv_namespaces]]
binding = "RATE_LIMIT"
id = "kv"

[[env.local.d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "db"

# ========================
# OBSERVABILITY
# ========================
[observability.logs]
enabled = true
