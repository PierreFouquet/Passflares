# wrangler.toml
name = "passflares"
main = "src/worker.ts"
compatibility_date = "2025-07-19"
workers_dev = true

[env.local]
[[d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "local"  # Critical for local dev

[[r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2"

[vars]
JWT_SECRET = "{{ JWT_SECRET }}"  # Overridden by .dev.vars.local

[env.production]
[[d1_databases]]
binding = "DB"
database_name = "secure-password-db"
database_id = "YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "VAULTS"
bucket_name = "secure-vaults-r2"

[assets]
directory = "./public"
binding = "ASSETS"

[observability.logs]
enabled = true